   &lt;div class=\"analysis-title\"&gt;Bitcoin Cycle Comparison&lt;/div&gt;\n\n        &lt;div class=\"analysis-subtitle\"&gt;\n            This interactive chart compares Bitcoin cycles by normalizing each cycle to\n            &lt;strong&gt;1x at the mid-halving starting point&lt;/strong&gt;.\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-grid\"&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;What is shown?&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;Each colored line is one Bitcoin cycle&lt;/li&gt;\n                    &lt;li&gt;The x-axis is blocks since the mid-halving start&lt;/li&gt;\n                    &lt;li&gt;The y-axis is price factor on a log scale&lt;/li&gt;\n                    &lt;li&gt;1x means the cycle starting price&lt;/li&gt;\n                    &lt;li&gt;Cycle 5 is partial, so no maximum or minimum is marked&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;Controls&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;&lt;strong&gt;ZOOM + / -&lt;/strong&gt; changes scale&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;BOX ZOOM&lt;/strong&gt; drag a box to zoom&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;PAN&lt;/strong&gt; moves the chart&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;HOME&lt;/strong&gt; resets the view&lt;/li&gt;\n                    &lt;li&gt;Click legend items to hide or show cycles&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;Method&lt;/h3&gt;\n                &lt;p&gt;\n                    For each cycle, Bitcoin price is divided by the price at the\n                    mid-halving starting point. This makes all cycles comparable as\n                    multiplicative growth factors.\n                &lt;/p&gt;\n
