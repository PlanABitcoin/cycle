argin-top: 0;\n        font-size: 28px;\n        color: #38bdf8;\n    }\n\n    .analysis-box ul,\n    .analysis-box p {\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .footer-note {\n        margin-top: 28px;\n        padding-top: 18px;\n        border-top: 1px solid rgba(255,255,255,0.15);\n        text-align: center;\n        font-size: 15px;\n        color: #cbd5e1;\n        line-height: 1.8;\n    }\n\n    .footer-note strong {\n        color: #facc15;\n    }\n\n    @media (max-width: 900px) {\n        .analysis-wrapper {\n            width: 100%;\n            padding: 18px;\n            border-radius: 16px;\n        }\n\n        .analysis-title {\n            font-size: 30px;\n        }\n\n        .analysis-subtitle {\n            font-size: 17px;\n        }\n\n        .analysis-grid {\n            grid-template-columns: 1fr;\n            gap: 18px;\n        }\n\n        .analysis-box h3 {\n            font-size: 24px;\n        }\n\n        .analysis-box ul,\n        .analysis-box p {\n            font-size: 16px;\n        }\n    }\n    &lt;/style&gt;\n\n    &lt;div class=\"analysis-wrapper\"&gt;\n        &lt;div class=\"analysis-title\"&gt;Bitcoin Power Law&lt;/div&gt;\n\n        &lt;div class=\"analysis-subtitle\"&gt;\n            This interactive chart fits Bitcoin's historical price to a\n            &lt;strong&gt;power law trend&lt;/strong&gt; as a function of days since genesis.\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-grid\"&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;What is shown?&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;Blue line is Bitcoin price&lt;/li&gt;\n                    &lt;li&gt;Orange line is the fitted power law&lt;/li&gt;\n                    &lt;li&gt;Green dashed line is the upper \u00d72 band&lt;/li&gt;\n                    &lt;li&gt;Red dashed line is the lower \u00f72 band&lt;/li&gt;\n                    &lt;li&gt;The y-axis is logarithmic&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;Controls&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;&lt;strong&gt;ZOOM + / -&lt;/strong&gt; zooms the chart&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;BOX ZOOM&lt;/strong&gt; drag a box to zoom&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;PAN&lt;/strong&gt; moves the chart&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;HOME&lt;/strong&gt; resets the view&lt;/li&gt;\n                    &lt;li&gt;Click legend items to hide or show curves&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;Method&lt;/h3&gt;\n                &lt;p&gt;\n                    The fitted model is\n                    log10(price) = 5.513 log10(days) + -15.882.\n                    The fit uses Bitcoin price data from June 2012 onward.\n                &lt;/p&gt;\n            &lt;/div&gt;\n\n        &lt;/div&gt;\n\n        &lt;div class=\"footer-note\"&gt;\n            &lt;strong&gt;Disclaimer:&lt;/strong&gt;\n            This chart is for educational purposes only and is not financial advice.\n        &lt;/div&gt;\n    &lt;/div&gt;\n    "}}]}}]}}
