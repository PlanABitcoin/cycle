5px rgba(0,0,0,0.30);\n    }\n\n    .analysis-title {\n        text-align: center;\n        font-size: 42px;\n        font-weight: 700;\n        margin-bottom: 20px;\n    }\n\n    .analysis-subtitle {\n        text-align: center;\n        font-size: 22px;\n        line-height: 1.7;\n        color: #d1d5db;\n        margin-bottom: 28px;\n    }\n\n    .analysis-subtitle strong {\n        color: #38bdf8;\n    }\n\n    .analysis-grid {\n        display: grid;\n        grid-template-columns: 1fr 1fr 1fr;\n        gap: 28px;\n        border-top: 1px solid rgba(255,255,255,0.15);\n        padding-top: 28px;\n    }\n\n    .analysis-box {\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.08);\n        border-radius: 18px;\n        padding: 24px;\n    }\n\n    .analysis-box h3 {\n        margin-top: 0;\n        font-size: 28px;\n        color: #38bdf8;\n    }\n\n    .analysis-box ul,\n    .analysis-box p {\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .footer-note {\n        margin-top: 28px;\n        padding-top: 18px;\n        border-top: 1px solid rgba(255,255,255,0.15);\n        text-align: center;\n        font-size: 15px;\n        color: #cbd5e1;\n        line-height: 1.8;\n    }\n\n    .footer-note strong {\n        color: #facc15;\n    }\n\n    @media (max-width: 900px) {\n        .analysis-wrapper {\n            width: 100%;\n            padding: 18px;\n            border-radius: 16px;\n        }\n\n        .analysis-title {\n            font-size: 30px;\n        }\n\n        .analysis-subtitle {\n            font-size: 17px;\n        }\n\n        .analysis-grid {\n            grid-template-columns: 1fr;\n            gap: 18px;\n        }\n\n        .analysis-box h3 {\n            font-size: 24px;\n        }\n\n        .analysis-box ul,\n        .analysis-box p {\n            font-size: 16px;\n        }\n    }\n    &lt;/style&gt;\n\n    &lt;div class=\"analysis-wrapper\"&gt;\n        &lt;div class=\"analysis-title\"&gt;\u26a1 Bitcoin Price and Mining Cost&lt;/div&gt;\n\n        &lt;div class=\"analysis-subtitle\"&gt;\n            This interactive chart compares\n            &lt;strong&gt;Bitcoin price&lt;/strong&gt;\n            with annualized miner income from\n            block rewards and transaction fees.\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-grid\"&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83d\udcca What is shown?&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;&lt;span style=\"color:#60a5fa;\"&gt;Blue&lt;/span&gt;: Bitcoin price on a log scale&lt;/li&gt;\n                    &lt;li&gt;&lt;span style=\"color:#ef4444;\"&gt;Red&lt;/span&gt;: total miner income, linear scale&lt;/li&gt;\n                    &lt;li&gt;&lt;span style=\"color:#22c55e;\"&gt;Green&lt;/span&gt;: 365 day moving average&lt;/li&gt;\n                    &lt;li&gt;&lt;span style=\"color:#f97316;\"&gt;Orange&lt;/span&gt;: 730 day moving average&lt;/li&gt;\n                    &lt;li&gt;&lt;span style=\"color:#d4d400;\"&gt;Olive&lt;/span&gt;: 90 day moving average&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83c\udfae Controls&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;&lt;strong&gt;ZOOM + / \u2212&lt;/strong&gt; zooms the price axis&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;BOX ZOOM&lt;/strong&gt; drag a box to zoom&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;PAN&lt;/strong&gt; moves the chart&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;HOME&lt;/strong&gt; resets the original view&lt;/li&gt;\n                    &lt;li&gt;Click legend items to hide or show lines&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83e\uddee Method&lt;/h3&gt;\n                &lt;p&gt;\n                    Reward income is approximated as\n                    Price \u00d7 Reward \u00d7 6 \u00d7 24 \u00d7 365.\n                    Transaction fees are added as\n                    Fees \u00d7 Price \u00d7 365.\n                    The right axis shows the result in billions of dollars per year.\n                &lt;/p&gt;\n            &lt;/div&gt;\n\n        &lt;/div&gt;\n\n        &lt;div class=\"footer-note\"&gt;\n            &lt;strong&gt;\u26a0 Disclaimer:&lt;/strong&gt;\n            This chart is for educational purposes only and is not financial advice.\n        &lt;/div&gt;\n    &lt;/div&gt;\n    "}}]}}]}}
