x;\n    color: white;\n    box-shadow: 0 10px 35px rgba(0,0,0,0.30);\n}\n\n.analysis-title {\n    text-align: center;\n    font-size: 42px;\n    font-weight: 700;\n    margin-bottom: 20px;\n}\n\n.analysis-subtitle {\n    text-align: center;\n    font-size: 22px;\n    line-height: 1.7;\n    color: #d1d5db;\n    margin-bottom: 28px;\n}\n\n.analysis-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 28px;\n    border-top: 1px solid rgba(255,255,255,0.15);\n    padding-top: 28px;\n}\n\n.analysis-box {\n    background: rgba(255,255,255,0.04);\n    border: 1px solid rgba(255,255,255,0.08);\n    border-radius: 18px;\n    padding: 24px;\n}\n\n.analysis-box h3 {\n    margin-top: 0;\n    font-size: 28px;\n    color: #38bdf8;\n}\n\n.analysis-box ul,\n.analysis-box p {\n    line-height: 1.9;\n    font-size: 18px;\n    color: #e5e7eb;\n}\n\n.footer-note {\n    margin-top: 28px;\n    padding-top: 18px;\n    border-top: 1px solid rgba(255,255,255,0.15);\n    text-align: center;\n    font-size: 15px;\n    color: #cbd5e1;\n    line-height: 1.8;\n}\n\n.footer-note strong {\n    color: #facc15;\n}\n\n@media (max-width: 900px) {\n    .analysis-wrapper {\n        width: 100%;\n        padding: 18px;\n        border-radius: 16px;\n    }\n\n    .analysis-title {\n        font-size: 30px;\n    }\n\n    .analysis-subtitle {\n        font-size: 17px;\n    }\n\n    .analysis-grid {\n        grid-template-columns: 1fr;\n        gap: 18px;\n    }\n\n    .analysis-box h3 {\n        font-size: 24px;\n    }\n\n    .analysis-box ul,\n    .analysis-box p {\n        font-size: 16px;\n    }\n}\n&lt;/style&gt;\n\n&lt;div class=\"analysis-wrapper\"&gt;\n\n    &lt;div class=\"analysis-title\"&gt;\u26a1 Bitcoin Price and Mining Cost&lt;/div&gt;\n\n    &lt;div class=\"analysis-subtitle\"&gt;\n        This figure compares Bitcoin price with estimated annual miner income from\n        block rewards and transaction fees. In the book, this figure is used to explain\n        why very high Bitcoin prices may eventually create unsustainable mining costs.\n    &lt;/div&gt;\n\n    &lt;div class=\"analysis-grid\"&gt;\n\n        &lt;div class=\"analysis-box\"&gt;\n            &lt;h3&gt;\ud83d\udcca What is shown?&lt;/h3&gt;\n            &lt;ul&gt;\n                &lt;li&gt;&lt;span style=\"color:#60a5fa;\"&gt;Blue&lt;/span&gt;: Bitcoin price on a logarithmic scale.&lt;/li&gt;\n                &lt;li&gt;&lt;span style=\"color:#ef4444;\"&gt;Red&lt;/span&gt;: estimated annual miner income from block rewards and fees.&lt;/li&gt;\n                &lt;li&gt;&lt;span style=\"color:#d4d400;\"&gt;Olive&lt;/span&gt;: 90 day moving average.&lt;/li&gt;\n                &lt;li&gt;&lt;span style=\"color:#22c55e;\"&gt;Green&lt;/span&gt;: 365 day moving average.&lt;/li&gt;\n                &lt;li&gt;&lt;span style=\"color:#f97316;\"&gt;Orange&lt;/span&gt;: 730 day moving average.&lt;/li&gt;\n            &lt;/ul&gt;\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-box\"&gt;\n            &lt;h3&gt;\ud83e\udde0 Economic idea&lt;/h3&gt;\n            &lt;p&gt;\n                The book argues that mining cost tends to follow Bitcoin price.\n                When the price rises, miner revenue rises in dollar terms. This attracts\n                more miners, more hardware, and more electricity consumption. Over time,\n                competition pushes total mining expenditure upward.\n            &lt;/p&gt;\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-box\"&gt;\n            &lt;h3&gt;\ud83d\udd01 Why it matters for cycles&lt;/h3&gt;\n            &lt;p&gt;\n                The halving reduces the flow of new Bitcoin supply, which can support\n                a long upward phase. But after a large rise, the implied mining cost may\n                become very high. The book argues that when this cost reaches tens of\n                billions of dollars per year, it may become difficult to sustain and can\n                contribute to a correction.\n            &lt;/p&gt;\n        &lt;/div&gt;\n\n    &lt;/div&gt;\n\n    &lt;div class=\"footer-note\"&gt;\n        &lt;strong&gt;Interpretation:&lt;/strong&gt;\n        This figure supports the second proposition in the book:\n        mining cost is proportional to Bitcoin price. Together with the halving mechanism,\n        this helps explain the repeated pattern of a long upward phase followed by a shorter\n        downward correction. This chart is for educational purposes only and is not financial advice.\n    &lt;/div&gt;\n\n&lt;/div&gt;\n"}}]}}]}}
