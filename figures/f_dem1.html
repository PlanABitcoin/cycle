ox h3 {\n        margin-top: 0;\n        font-size: 28px;\n        color: #38bdf8;\n    }\n\n    .analysis-box ul,\n    .analysis-box p {\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .footer-note {\n        margin-top: 28px;\n        padding-top: 18px;\n        border-top: 1px solid rgba(255,255,255,0.15);\n        text-align: center;\n        font-size: 15px;\n        color: #cbd5e1;\n        line-height: 1.8;\n    }\n\n    .footer-note strong {\n        color: #facc15;\n    }\n\n    @media (max-width: 900px) {\n        .analysis-wrapper {\n            width: 100%;\n            padding: 18px;\n            border-radius: 16px;\n        }\n\n        .analysis-title {\n            font-size: 30px;\n        }\n\n        .analysis-subtitle {\n            font-size: 17px;\n        }\n\n        .analysis-grid {\n            grid-template-columns: 1fr;\n            gap: 18px;\n        }\n\n        .analysis-box h3 {\n            font-size: 24px;\n        }\n\n        .analysis-box ul,\n        .analysis-box p {\n            font-size: 16px;\n        }\n    }\n    &lt;/style&gt;\n\n    &lt;div class=\"analysis-wrapper\"&gt;\n        &lt;div class=\"analysis-title\"&gt;\ud83d\udcc9 Bitcoin Diminishing Returns&lt;/div&gt;\n\n        &lt;div class=\"analysis-subtitle\"&gt;\n            This interactive chart compares Bitcoin cycles by normalizing each cycle to\n            &lt;strong&gt;100% at its mid-halving starting point&lt;/strong&gt;.\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-grid\"&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83d\udcca What is shown?&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;Each colored line is one Bitcoin cycle&lt;/li&gt;\n                    &lt;li&gt;The y-axis is price index on a log scale&lt;/li&gt;\n                    &lt;li&gt;100% means the start of that cycle&lt;/li&gt;\n                    &lt;li&gt;Yellow dashed lines mark mid-halving blocks&lt;/li&gt;\n                    &lt;li&gt;The latest cycle is partial because data is incomplete&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83c\udfae Controls&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;&lt;strong&gt;ZOOM + / \u2212&lt;/strong&gt; zooms the chart&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;BOX ZOOM&lt;/strong&gt; drag a box to zoom&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;PAN&lt;/strong&gt; moves the chart&lt;/li&gt;\n                    &lt;li&gt;&lt;strong&gt;HOME&lt;/strong&gt; resets the original view&lt;/li&gt;\n                    &lt;li&gt;Click legend items to hide or show cycles&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83e\uddee Method&lt;/h3&gt;\n                &lt;p&gt;\n                    For each cycle, the price is divided by the first price in that\n                    mid-halving cycle and multiplied by 100. This makes different\n                    cycles comparable on the same logarithmic scale.\n                &lt;/p&gt;\n            &lt;/div&gt;\n\n        &lt;/div&gt;\n\n        &lt;div class=\"footer-note\"&gt;\n            &lt;strong&gt;\u26a0 Disclaimer:&lt;/strong&gt;\n            This chart is for educational purposes only and is not financial advice.\n        &lt;/div&gt;\n    &lt;/div&gt;\n    "}}]}}]}}
