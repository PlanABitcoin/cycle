lor: #e5e7eb;\n    }\n\n    .analysis-box li {\n        margin-bottom: 10px;\n    }\n\n    .analysis-box p {\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .wide-box {\n        margin-top: 28px;\n        background:\n            rgba(255,255,255,0.04);\n\n        border:\n            1px solid rgba(255,255,255,0.08);\n\n        border-radius: 18px;\n        padding: 24px;\n    }\n\n    .wide-box h3 {\n        margin-top: 0;\n        font-size: 30px;\n        color: #facc15;\n    }\n\n    .wide-box p {\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .table-wrapper {\n        width: 100%;\n        overflow-x: auto;\n        margin: 18px 0 26px 0;\n    }\n\n    .prediction-table {\n        width: 100%;\n        border-collapse: collapse;\n        min-width: 760px;\n        font-size: 16px;\n        color: #e5e7eb;\n        background: rgba(255,255,255,0.03);\n    }\n\n    .prediction-table th {\n        background: rgba(56,189,248,0.18);\n        color: #ffffff;\n        padding: 12px;\n        text-align: left;\n        border-bottom: 1px solid rgba(255,255,255,0.18);\n        white-space: nowrap;\n    }\n\n    .prediction-table td {\n        padding: 11px 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.10);\n        white-space: nowrap;\n    }\n\n    .prediction-table tr:hover {\n        background: rgba(255,255,255,0.06);\n    }\n\n    .green-text {\n        color: #22c55e;\n        font-weight: bold;\n    }\n\n    .red-text {\n        color: #ef4444;\n        font-weight: bold;\n    }\n\n    .blue-text {\n        color: #60a5fa;\n        font-weight: bold;\n    }\n\n    .footer-note {\n        margin-top: 28px;\n        padding-top: 18px;\n        border-top:\n            1px solid rgba(255,255,255,0.15);\n        text-align: center;\n        font-size: 15px;\n        color: #cbd5e1;\n        line-height: 1.8;\n    }\n\n    .footer-note strong {\n        color: #facc15;\n    }\n\n    @media (max-width: 900px) {\n\n        .analysis-wrapper {\n            padding: 18px;\n            border-radius: 16px;\n        }\n\n        .analysis-title {\n            font-size: 30px;\n            line-height: 1.3;\n        }\n\n        .analysis-subtitle {\n            font-size: 17px;\n            line-height: 1.7;\n        }\n\n        .analysis-grid {\n            grid-template-columns: 1fr;\n            gap: 18px;\n        }\n\n        .analysis-box,\n        .wide-box {\n            padding: 18px;\n        }\n\n        .analysis-box h3,\n        .wide-box h3 {\n            font-size: 24px;\n        }\n\n        .analysis-box ul,\n        .analysis-box p,\n        .wide-box p {\n            font-size: 16px;\n            line-height: 1.8;\n        }\n\n        .prediction-table {\n            font-size: 14px;\n            min-width: 680px;\n        }\n\n        .footer-note {\n            font-size: 13px;\n        }\n    }\n\n    &lt;/style&gt;\n\n    &lt;div class=\"analysis-wrapper\"&gt;\n\n        &lt;div class=\"analysis-title\"&gt;\n            \ud83d\udcca Bitcoin Cycle Prediction\n        &lt;/div&gt;\n\n\n        &lt;div class=\"analysis-subtitle\"&gt;\n\n        &lt;div style=\"\n            font-size:18px;\n            color:#93c5fd;\n            margin-bottom:14px;\n            font-weight:bold;\n        \"&gt;\n            Bitcoin price data through: 2026-06-12\n        &lt;/div&gt;\n\n        This interactive chart analyzes\n        &lt;strong&gt;Bitcoin's historical price cycles&lt;/strong&gt;\n        and projects possible future movements using the same logic\n        described in the book: halvings reduce new supply, the upward\n        phase tends to last several years, and very large price increases\n        are often followed by a shorter correction.\n\n    &lt;/div&gt;\n\n        &lt;div class=\"analysis-grid\"&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n\n                &lt;h3&gt;\ud83d\udd0d What the Figure Shows&lt;/h3&gt;\n\n                &lt;ul&gt;\n                    &lt;li&gt;\n                        &lt;span style=\"color:#ef4444;\"&gt;\n                        Red vertical lines\n                        &lt;/span&gt;\n                        mark halving events.\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;span style=\"color:#ef4444;\"&gt;\n                        Red circles\n                        &lt;/span&gt;\n                        indicate historical cycle peaks.\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;span style=\"color:#60a5fa;\"&gt;\n                        Blue X markers\n                        &lt;/span&gt;\n                        show historical cycle bottoms.\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        Green arrows show upward cycle movements, and red arrows show downward corrections.\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;span style=\"color:#22c55e;\"&gt;\n                        Green circles\n                        &lt;/span&gt;\n                        show possible future scenarios.\n                    &lt;/li&gt;\n                &lt;/ul&gt;\n\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n\n                &lt;h3&gt;\ud83d\udcd8 Book Logic&lt;/h3&gt;\n\n                &lt;p&gt;\n                    The prediction follows two central ideas from the book.\n                    First, the mining reward is the main source of new Bitcoin\n                    supply. Every halving cuts that flow in half, which may\n                    create upward pressure if demand remains strong.\n                &lt;/p&gt;\n\n                &lt;p&gt;\n                    Second, mining cost tends to follow Bitcoin price. When the\n                    price rises too much, the implied mining cost becomes very\n                    large and may create pressure for a correction.\n                &lt;/p&gt;\n\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n\n                &lt;h3&gt;\ud83e\udded Prediction Steps&lt;/h3&gt;\n\n                &lt;ul&gt;\n                    &lt;li&gt;\n                        Step 1: find each cycle top before the next halving.\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        Step 2: find the following bottom after each top.\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        Step 3: estimate possible future bottoms using\n                        historical top-to-bottom decline ratios.\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        Step 4: estimate possible future tops using annual\n                        growth scenarios that reflect diminishing returns.\n                    &lt;/li&gt;\n                &lt;/ul&gt;\n\n            &lt;/div&gt;\n\n        &lt;/div&gt;\n\n        &lt;div class=\"wide-box\"&gt;\n            &lt;h3&gt;1. Historical Downward Phases&lt;/h3&gt;\n\n            &lt;p&gt;\n                This table shows how much Bitcoin declined from each historical\n                cycle top to the following cycle bottom. These declines are used\n                to choose possible future bottom scenarios.\n            &lt;/p&gt;\n\n            &lt;div class=\"table-wrapper\"&gt;\n                \n    &lt;table class=\"prediction-table\"&gt;\n        &lt;thead&gt;\n            &lt;tr&gt;\n                &lt;th&gt;Cycle&lt;/th&gt;\n                &lt;th&gt;Top date&lt;/th&gt;\n                &lt;th&gt;Top price&lt;/th&gt;\n                &lt;th&gt;Bottom date&lt;/th&gt;\n                &lt;th&gt;Bottom price&lt;/th&gt;\n                &lt;th&gt;Drawdown&lt;/th&gt;\n                &lt;th&gt;Top / Bottom&lt;/th&gt;\n            &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n    \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 1&lt;/td&gt;\n                &lt;td&gt;2011-06-11&lt;/td&gt;\n                &lt;td&gt;$34&lt;/td&gt;\n                &lt;td&gt;2011-11-22&lt;/td&gt;\n                &lt;td&gt;$2&lt;/td&gt;\n                &lt;td&gt;-93.2%&lt;/td&gt;\n                &lt;td&gt;14.70x&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 2&lt;/td&gt;\n                &lt;td&gt;2013-12-05&lt;/td&gt;\n                &lt;td&gt;$1,137&lt;/td&gt;\n                &lt;td&gt;2015-01-15&lt;/td&gt;\n                &lt;td&gt;$172&lt;/td&gt;\n                &lt;td&gt;-84.9%&lt;/td&gt;\n                &lt;td&gt;6.61x&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 3&lt;/td&gt;\n                &lt;td&gt;2017-12-17&lt;/td&gt;\n                &lt;td&gt;$19,280&lt;/td&gt;\n                &lt;td&gt;2018-12-16&lt;/td&gt;\n                &lt;td&gt;$3,232&lt;/td&gt;\n                &lt;td&gt;-83.2%&lt;/td&gt;\n                &lt;td&gt;5.97x&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 4&lt;/td&gt;\n                &lt;td&gt;2021-11-09&lt;/td&gt;\n                &lt;td&gt;$67,562&lt;/td&gt;\n                &lt;td&gt;2022-11-22&lt;/td&gt;\n                &lt;td&gt;$15,760&lt;/td&gt;\n                &lt;td&gt;-76.7%&lt;/td&gt;\n                &lt;td&gt;4.29x&lt;/td&gt;\n            &lt;/tr&gt;\n        \n        &lt;/tbody&gt;\n    &lt;/table&gt;\n    \n            &lt;/div&gt;\n        &lt;/div&gt;\n\n        &lt;div class=\"wide-box\"&gt;\n            &lt;h3&gt;2. Historical Upward Phases&lt;/h3&gt;\n\n            &lt;p&gt;\n                This table shows the rise from each cycle bottom to the next\n                cycle top. The general pattern is that the percentage gains\n                become smaller over time, which is the diminishing-returns\n                effect discussed in the book.\n            &lt;/p&gt;\n\n            &lt;div class=\"table-wrapper\"&gt;\n                \n    &lt;table class=\"prediction-table\"&gt;\n        &lt;thead&gt;\n            &lt;tr&gt;\n                &lt;th&gt;Cycle&lt;/th&gt;\n                &lt;th&gt;Bottom date&lt;/th&gt;\n                &lt;th&gt;Bottom price&lt;/th&gt;\n                &lt;th&gt;Top date&lt;/th&gt;\n                &lt;th&gt;Top price&lt;/th&gt;\n                &lt;th&gt;Bottom \u2192 Top&lt;/th&gt;\n                &lt;th&gt;Annual rate&lt;/th&gt;\n            &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n    \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 2&lt;/td&gt;\n                &lt;td&gt;2011-11-22&lt;/td&gt;\n                &lt;td&gt;$2&lt;/td&gt;\n                &lt;td&gt;2013-12-05&lt;/td&gt;\n                &lt;td&gt;$1,137&lt;/td&gt;\n                &lt;td&gt;494.30x&lt;/td&gt;\n                &lt;td&gt;+2001.6%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 3&lt;/td&gt;\n                &lt;td&gt;2015-01-15&lt;/td&gt;\n                &lt;td&gt;$172&lt;/td&gt;\n                &lt;td&gt;2017-12-17&lt;/td&gt;\n                &lt;td&gt;$19,280&lt;/td&gt;\n                &lt;td&gt;112.09x&lt;/td&gt;\n                &lt;td&gt;+403.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 4&lt;/td&gt;\n                &lt;td&gt;2018-12-16&lt;/td&gt;\n                &lt;td&gt;$3,232&lt;/td&gt;\n                &lt;td&gt;2021-11-09&lt;/td&gt;\n                &lt;td&gt;$67,562&lt;/td&gt;\n                &lt;td&gt;20.90x&lt;/td&gt;\n                &lt;td&gt;+185.3%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Cycle 5&lt;/td&gt;\n                &lt;td&gt;2022-11-22&lt;/td&gt;\n                &lt;td&gt;$15,760&lt;/td&gt;\n                &lt;td&gt;2025-10-07&lt;/td&gt;\n                &lt;td&gt;$124,777&lt;/td&gt;\n                &lt;td&gt;7.92x&lt;/td&gt;\n                &lt;td&gt;+105.4%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n        &lt;/tbody&gt;\n    &lt;/table&gt;\n    \n            &lt;/div&gt;\n        &lt;/div&gt;\n\n        &lt;div class=\"wide-box\"&gt;\n            &lt;h3&gt;3. Future Bottom Scenarios&lt;/h3&gt;\n\n            &lt;p&gt;\n                The future bottom is estimated by applying several historical\n                top-to-bottom decline ratios to the current projected cycle top.\n                The dotted downward lines in the chart correspond to these\n                scenarios.\n            &lt;/p&gt;\n\n            &lt;div class=\"table-wrapper\"&gt;\n                \n    &lt;table class=\"prediction-table\"&gt;\n        &lt;thead&gt;\n            &lt;tr&gt;\n                &lt;th&gt;Scenario&lt;/th&gt;\n                &lt;th&gt;Predicted date&lt;/th&gt;\n                &lt;th&gt;Predicted bottom&lt;/th&gt;\n                &lt;th&gt;Top / Bottom&lt;/th&gt;\n                &lt;th&gt;Annual decline&lt;/th&gt;\n            &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n    \n            &lt;tr&gt;\n                &lt;td&gt;Bottom 1&lt;/td&gt;\n                &lt;td&gt;2026-09-22&lt;/td&gt;\n                &lt;td&gt;$51,775&lt;/td&gt;\n                &lt;td&gt;2.41x&lt;/td&gt;\n                &lt;td&gt;-60.1%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Bottom 2&lt;/td&gt;\n                &lt;td&gt;2026-09-22&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;3.17x&lt;/td&gt;\n                &lt;td&gt;-70.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Bottom 3&lt;/td&gt;\n                &lt;td&gt;2026-09-22&lt;/td&gt;\n                &lt;td&gt;$26,662&lt;/td&gt;\n                &lt;td&gt;4.68x&lt;/td&gt;\n                &lt;td&gt;-80.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n        &lt;/tbody&gt;\n    &lt;/table&gt;\n    \n            &lt;/div&gt;\n        &lt;/div&gt;\n\n        &lt;div class=\"wide-box\"&gt;\n            &lt;h3&gt;4. Future Top Scenarios&lt;/h3&gt;\n\n            &lt;p&gt;\n                After a possible bottom is selected, the next top is projected\n                using several annual growth assumptions. These assumptions are\n                intentionally lower than the early Bitcoin cycles because the\n                book argues that Bitcoin exhibits diminishing returns as the\n                market becomes larger.\n            &lt;/p&gt;\n\n            &lt;div class=\"table-wrapper\"&gt;\n                \n    &lt;table class=\"prediction-table\"&gt;\n        &lt;thead&gt;\n            &lt;tr&gt;\n                &lt;th&gt;Scenario&lt;/th&gt;\n                &lt;th&gt;Predicted date&lt;/th&gt;\n                &lt;th&gt;Starting bottom&lt;/th&gt;\n                &lt;th&gt;Predicted top&lt;/th&gt;\n                &lt;th&gt;Bottom \u2192 Top&lt;/th&gt;\n                &lt;th&gt;Annual growth&lt;/th&gt;\n            &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n    \n            &lt;tr&gt;\n                &lt;td&gt;Top 1&lt;/td&gt;\n                &lt;td&gt;2029-06-18&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;$340,860&lt;/td&gt;\n                &lt;td&gt;8.66x&lt;/td&gt;\n                &lt;td&gt;+120.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Top 2&lt;/td&gt;\n                &lt;td&gt;2029-06-18&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;$262,573&lt;/td&gt;\n                &lt;td&gt;6.67x&lt;/td&gt;\n                &lt;td&gt;+100.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Top 3&lt;/td&gt;\n                &lt;td&gt;2029-06-18&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;$196,776&lt;/td&gt;\n                &lt;td&gt;5.00x&lt;/td&gt;\n                &lt;td&gt;+80.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n        &lt;/tbody&gt;\n    &lt;/table&gt;\n    \n            &lt;/div&gt;\n        &lt;/div&gt;\n\n        &lt;div class=\"footer-note\"&gt;\n\n            &lt;strong&gt;\u26a0 Disclaimer:&lt;/strong&gt;\n            This analysis is for educational purposes only and is not financial advice.\n            The cycle may break because of regulation, demand collapse,\n            macroeconomic shocks, technological risks, or black swan events.\n\n        &lt;/div&gt;\n\n    &lt;/div&gt;\n    "}}]}}]}}
