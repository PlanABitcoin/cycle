le\"&gt;\n            \ud83d\udcca About This Analysis\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-subtitle\"&gt;\n\n            This interactive chart analyzes\n            &lt;strong&gt;Bitcoin's historical price cycles&lt;/strong&gt;\n            and projects potential future movements\n            based on recurring patterns across\n            multiple halving cycles.\n\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-grid\"&gt;\n\n            &lt;!-- LEFT --&gt;\n            &lt;div class=\"analysis-box\"&gt;\n\n                &lt;h3&gt;\ud83d\udd0d Key Features&lt;/h3&gt;\n\n                &lt;ul&gt;\n\n                    &lt;li&gt;\n                        &lt;span style=\"color:#ef4444;\"&gt;\n                        Red vertical lines\n                        &lt;/span&gt;\n                        mark halving events\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;span style=\"color:#ef4444;\"&gt;\n                        Red circles\n                        &lt;/span&gt;\n                        indicate cycle peaks\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;span style=\"color:#60a5fa;\"&gt;\n                        Blue X markers\n                        &lt;/span&gt;\n                        show cycle bottoms\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        Black arrows display\n                        annualized rates\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;span style=\"color:#22c55e;\"&gt;\n                        Green circles\n                        &lt;/span&gt;\n                        show projections\n                    &lt;/li&gt;\n\n                &lt;/ul&gt;\n\n            &lt;/div&gt;\n\n            &lt;!-- CENTER --&gt;\n            &lt;div class=\"analysis-box\"&gt;\n\n                &lt;h3&gt;\ud83c\udfae Controls&lt;/h3&gt;\n\n                &lt;ul&gt;\n\n                    &lt;li&gt;\n                        &lt;strong&gt;ZOOM + / \u2212&lt;/strong&gt;\n                        zooms the chart\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;strong&gt;BOX ZOOM&lt;/strong&gt;\n                        drag-to-zoom\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;strong&gt;PAN&lt;/strong&gt;\n                        moves the chart\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        &lt;strong&gt;HOME&lt;/strong&gt;\n                        resets the view\n                    &lt;/li&gt;\n\n                    &lt;li&gt;\n                        Hover shows exact values\n                    &lt;/li&gt;\n\n                &lt;/ul&gt;\n\n            &lt;/div&gt;\n\n            &lt;!-- RIGHT --&gt;\n            &lt;div class=\"analysis-box\"&gt;\n\n                &lt;h3&gt;\ud83d\udcc8 Methodology&lt;/h3&gt;\n\n                &lt;p&gt;\n\n                    The analysis identifies historical\n                    cycle peaks and bottoms,\n                    estimates annualized growth\n                    and decline rates,\n                    and extrapolates multiple future\n                    scenarios to account for\n                    uncertainty and diminishing returns.\n\n                &lt;/p&gt;\n\n            &lt;/div&gt;\n\n        &lt;/div&gt;\n\n        &lt;div class=\"footer-note\"&gt;\n\n            &lt;strong&gt;\u26a0 Disclaimer:&lt;/strong&gt;\n            This analysis is for educational purposes only.\n           \n\n           \n        &lt;/div&gt;\n\n    &lt;/div&gt;\n    "}}]}}]}}
