;\n    }\n\n    .analysis-title {\n        text-align: center;\n        font-size: 42px;\n        font-weight: 700;\n        margin-bottom: 20px;\n        color: white;\n    }\n\n    .analysis-subtitle {\n        text-align: center;\n        font-size: 22px;\n        line-height: 1.7;\n        color: #d1d5db;\n        margin-bottom: 28px;\n    }\n\n    .analysis-subtitle strong {\n        color: #38bdf8;\n    }\n\n    .analysis-grid {\n        display: grid;\n        grid-template-columns: 1fr 1fr 1fr;\n        gap: 28px;\n        border-top: 1px solid rgba(255,255,255,0.15);\n        padding-top: 28px;\n    }\n\n    .analysis-box {\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.08);\n        border-radius: 18px;\n        padding: 24px;\n        backdrop-filter: blur(8px);\n    }\n\n    .analysis-box h3 {\n        margin-top: 0;\n        margin-bottom: 18px;\n        font-size: 28px;\n        color: #38bdf8;\n    }\n\n    .analysis-box ul {\n        margin: 0;\n        padding-left: 22px;\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .analysis-box p {\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .wide-box {\n        margin-top: 28px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.08);\n        border-radius: 18px;\n        padding: 24px;\n    }\n\n    .wide-box h3 {\n        margin-top: 0;\n        font-size: 30px;\n        color: #facc15;\n    }\n\n    .wide-box p {\n        line-height: 1.9;\n        font-size: 18px;\n        color: #e5e7eb;\n    }\n\n    .table-wrapper {\n        width: 100%;\n        overflow-x: auto;\n        margin: 18px 0 26px 0;\n    }\n\n    .prediction-table {\n        width: 100%;\n        border-collapse: collapse;\n        min-width: 760px;\n        font-size: 16px;\n        color: #e5e7eb;\n        background: rgba(255,255,255,0.03);\n    }\n\n    .prediction-table th {\n        background: rgba(56,189,248,0.18);\n        color: #ffffff;\n        padding: 12px;\n        text-align: left;\n        border-bottom: 1px solid rgba(255,255,255,0.18);\n        white-space: nowrap;\n    }\n\n    .prediction-table td {\n        padding: 11px 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.10);\n        white-space: nowrap;\n    }\n\n    .footer-note {\n        margin-top: 28px;\n        padding-top: 18px;\n        border-top: 1px solid rgba(255,255,255,0.15);\n        text-align: center;\n        font-size: 15px;\n        color: #cbd5e1;\n        line-height: 1.8;\n    }\n\n    .footer-note strong {\n        color: #facc15;\n    }\n\n    @media (max-width: 900px) {\n\n        .analysis-wrapper {\n            padding: 18px;\n            border-radius: 16px;\n        }\n\n        .analysis-title {\n            font-size: 30px;\n            line-height: 1.3;\n        }\n\n        .analysis-subtitle {\n            font-size: 17px;\n            line-height: 1.7;\n        }\n\n        .analysis-grid {\n            grid-template-columns: 1fr;\n            gap: 18px;\n        }\n\n        .analysis-box,\n        .wide-box {\n            padding: 18px;\n        }\n\n        .analysis-box h3,\n        .wide-box h3 {\n            font-size: 24px;\n        }\n\n        .analysis-box ul,\n        .analysis-box p,\n        .wide-box p {\n            font-size: 16px;\n            line-height: 1.8;\n        }\n\n        .prediction-table {\n            font-size: 14px;\n            min-width: 680px;\n        }\n\n        .footer-note {\n            font-size: 13px;\n        }\n    }\n\n    &lt;/style&gt;\n\n    &lt;div class=\"analysis-wrapper\"&gt;\n\n        &lt;div class=\"analysis-title\"&gt;\n            \ud83d\udcca Bitcoin Cycle Prediction (Short Term)\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-subtitle\"&gt;\n\n            &lt;div style=\"\n                font-size:18px;\n                color:#93c5fd;\n                margin-bottom:14px;\n                font-weight:bold;\n            \"&gt;\n                Bitcoin price data through: 2026-06-14\n            &lt;/div&gt;\n\n            This short-term version focuses only on the current Bitcoin cycle,\n            starting from the late-2022 bottom, rising toward the current cycle\n            top, and projecting possible paths toward the next cycle bottom and\n            the following recovery.\n\n        &lt;/div&gt;\n\n        &lt;div class=\"analysis-grid\"&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83d\udd0d What the Figure Shows&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;Blue line: Bitcoin price.&lt;/li&gt;\n                    &lt;li&gt;Blue X: late-2022 cycle bottom.&lt;/li&gt;\n                    &lt;li&gt;Red circle: current cycle top.&lt;/li&gt;\n                    &lt;li&gt;Green arrow: upward phase from bottom to top.&lt;/li&gt;\n                    &lt;li&gt;Red dotted arrows: possible future bottom scenarios.&lt;/li&gt;\n                    &lt;li&gt;Green dotted arrows: possible recovery scenarios.&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83d\udcd8 Short-Term Focus&lt;/h3&gt;\n                &lt;p&gt;\n                    Unlike the full prediction figure, this chart zooms into the\n                    most recent cycle only. It is designed to make the current\n                    cycle structure easier to see without the earlier historical\n                    cycles compressing the figure.\n                &lt;/p&gt;\n            &lt;/div&gt;\n\n            &lt;div class=\"analysis-box\"&gt;\n                &lt;h3&gt;\ud83e\udded Prediction Logic&lt;/h3&gt;\n                &lt;ul&gt;\n                    &lt;li&gt;Start from the late-2022 bottom.&lt;/li&gt;\n                    &lt;li&gt;Follow the rise toward the current cycle top.&lt;/li&gt;\n                    &lt;li&gt;Apply historical top-to-bottom decline ratios.&lt;/li&gt;\n                    &lt;li&gt;Project possible recovery paths after the bottom.&lt;/li&gt;\n                &lt;/ul&gt;\n            &lt;/div&gt;\n\n        &lt;/div&gt;\n\n        &lt;div class=\"wide-box\"&gt;\n            &lt;h3&gt;1. Future Bottom Scenarios&lt;/h3&gt;\n            &lt;p&gt;\n                The future bottom is estimated by applying several historical\n                top-to-bottom decline ratios to the current cycle top.\n            &lt;/p&gt;\n            &lt;div class=\"table-wrapper\"&gt;\n                \n    &lt;table class=\"prediction-table\"&gt;\n        &lt;thead&gt;\n            &lt;tr&gt;\n                &lt;th&gt;Scenario&lt;/th&gt;\n                &lt;th&gt;Predicted date&lt;/th&gt;\n                &lt;th&gt;Predicted bottom&lt;/th&gt;\n                &lt;th&gt;Top / Bottom&lt;/th&gt;\n                &lt;th&gt;Annual decline&lt;/th&gt;\n            &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n    \n            &lt;tr&gt;\n                &lt;td&gt;Bottom 1&lt;/td&gt;\n                &lt;td&gt;2026-09-22&lt;/td&gt;\n                &lt;td&gt;$51,775&lt;/td&gt;\n                &lt;td&gt;2.41x&lt;/td&gt;\n                &lt;td&gt;-60.1%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Bottom 2&lt;/td&gt;\n                &lt;td&gt;2026-09-22&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;3.17x&lt;/td&gt;\n                &lt;td&gt;-70.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Bottom 3&lt;/td&gt;\n                &lt;td&gt;2026-09-22&lt;/td&gt;\n                &lt;td&gt;$26,662&lt;/td&gt;\n                &lt;td&gt;4.68x&lt;/td&gt;\n                &lt;td&gt;-80.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n        &lt;/tbody&gt;\n    &lt;/table&gt;\n    \n            &lt;/div&gt;\n        &lt;/div&gt;\n\n        &lt;div class=\"wide-box\"&gt;\n            &lt;h3&gt;2. Future Top Scenarios&lt;/h3&gt;\n            &lt;p&gt;\n                After a possible bottom is selected, the next top is projected\n                using several annual growth assumptions. These assumptions\n                reflect the diminishing-returns effect discussed in the book.\n            &lt;/p&gt;\n            &lt;div class=\"table-wrapper\"&gt;\n                \n    &lt;table class=\"prediction-table\"&gt;\n        &lt;thead&gt;\n            &lt;tr&gt;\n                &lt;th&gt;Scenario&lt;/th&gt;\n                &lt;th&gt;Predicted date&lt;/th&gt;\n                &lt;th&gt;Starting bottom&lt;/th&gt;\n                &lt;th&gt;Predicted top&lt;/th&gt;\n                &lt;th&gt;Bottom \u2192 Top&lt;/th&gt;\n                &lt;th&gt;Annual growth&lt;/th&gt;\n            &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n    \n            &lt;tr&gt;\n                &lt;td&gt;Top 1&lt;/td&gt;\n                &lt;td&gt;2029-06-18&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;$340,860&lt;/td&gt;\n                &lt;td&gt;8.66x&lt;/td&gt;\n                &lt;td&gt;+120.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Top 2&lt;/td&gt;\n                &lt;td&gt;2029-06-18&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;$262,573&lt;/td&gt;\n                &lt;td&gt;6.67x&lt;/td&gt;\n                &lt;td&gt;+100.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n            &lt;tr&gt;\n                &lt;td&gt;Top 3&lt;/td&gt;\n                &lt;td&gt;2029-06-18&lt;/td&gt;\n                &lt;td&gt;$39,362&lt;/td&gt;\n                &lt;td&gt;$196,776&lt;/td&gt;\n                &lt;td&gt;5.00x&lt;/td&gt;\n                &lt;td&gt;+80.0%&lt;/td&gt;\n            &lt;/tr&gt;\n        \n        &lt;/tb
